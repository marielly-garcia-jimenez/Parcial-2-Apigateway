server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/productos/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/ordenes/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/pagos/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
